<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>2학년 2차 정기고사 대비 온라인 모의고사</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:#f0f4f8;color:#1a1a1a;word-break:keep-all}

/* ── 시작화면 ── */
#start-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f6e56,#1a9e7a)}
.start-box{background:#fff;border-radius:20px;padding:40px 36px;max-width:480px;width:90%;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.2)}
.start-box h1{font-size:20px;font-weight:700;color:#0f6e56;margin-bottom:4px}
.start-box h2{font-size:16px;font-weight:500;color:#444;margin-bottom:20px}
.start-box .sub{font-size:13px;color:#888;margin-bottom:20px}
.info-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:24px}
.info-card{background:#f0fbf6;border-radius:10px;padding:14px 8px;text-align:center}
.info-card .num{font-size:24px;font-weight:700;color:#0f6e56}
.info-card .label{font-size:11px;color:#666;margin-top:2px}
.pass-badge{background:#fef9ec;border:1px solid #f0c040;border-radius:10px;padding:12px;margin-bottom:20px;font-size:13px;color:#7a5900}
.pass-badge strong{color:#b87c00;font-size:15px}
.name-input{width:100%;padding:12px 16px;border:2px solid #e0e0e0;border-radius:10px;font-size:15px;font-family:inherit;margin-bottom:16px;transition:.2s}
.name-input:focus{border-color:#0f6e56;outline:none}
.start-btn{width:100%;padding:14px;background:#0f6e56;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;transition:.2s}
.start-btn:hover{background:#0a5440;transform:translateY(-1px)}

/* ── 헤더 ── */
#quiz-screen{display:none}
.quiz-header{background:linear-gradient(135deg,#0f6e56,#1a9e7a);color:#fff;padding:14px 20px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.quiz-header-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.header-title{font-size:14px;font-weight:700}
.header-sub{font-size:12px;opacity:.85;margin-top:2px}
.progress-wrap{text-align:right}
.progress-bar-bg{width:120px;height:6px;background:rgba(255,255,255,.3);border-radius:3px;margin-top:4px}
.progress-bar-fill{height:6px;background:#fff;border-radius:3px;transition:width .3s}

/* ── 문제 영역 ── */
.quiz-main{max-width:860px;margin:0 auto;padding:20px 16px 120px}
.q-block{background:#fff;border-radius:14px;padding:20px;margin-bottom:14px;box-shadow:0 1px 6px rgba(0,0,0,.06)}
.q-num{font-size:12px;font-weight:700;color:#0f6e56;margin-bottom:6px}
.q-cat{display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;margin-bottom:8px;font-weight:500}
.cat-순환계{background:#e8f4ff;color:#1a4fa0}
.cat-호흡기계{background:#e8fff5;color:#0f6e56}
.cat-소화기계{background:#fff3e8;color:#a05a00}
.q-text{font-size:15px;font-weight:500;line-height:1.7;margin-bottom:14px}
.choice-list{list-style:none}
.choice-item{margin-bottom:8px}
.choice-btn{width:100%;text-align:left;padding:10px 14px;border:1.5px solid #e0e0e0;border-radius:10px;background:#fff;font-size:14px;font-family:inherit;cursor:pointer;transition:.15s;color:#1a1a1a;line-height:1.5}
.choice-btn:hover{border-color:#0f6e56;background:#f0fbf6}
.choice-btn.selected{border-color:#0f6e56;background:#e8fff5;font-weight:500}
.choice-btn.correct{border-color:#059669;background:#d1fae5;color:#065f46;font-weight:700}
.choice-btn.wrong{border-color:#dc2626;background:#fee2e2;color:#991b1b}
.choice-btn.show-correct{border-color:#059669;background:#d1fae5;color:#065f46;font-weight:700}
.q-exp{margin-top:12px;padding:10px 14px;background:#fefce8;border-radius:8px;font-size:13px;color:#555;line-height:1.6;border-left:3px solid #f0c040;display:none}
.q-exp.show{display:block}

.lv-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-left:6px;vertical-align:middle}
.lv-하{background:#dbeafe;color:#1e40af}
.lv-중{background:#fef9c3;color:#854d0e}
.lv-상{background:#fee2e2;color:#991b1b}
.lv-notice{background:#f8fafc;border:1px solid #e0e0e0;border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:#555;display:flex;gap:10px;flex-wrap:wrap;align-items:center}


/* ── 하단 바 ── */
.submit-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e0e0e0;padding:12px 20px;z-index:100;box-shadow:0 -2px 8px rgba(0,0,0,.08)}
.submit-bar-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px}
.answered-count{font-size:13px;color:#666}
.answered-count strong{color:#0f6e56;font-size:16px}
.submit-btn{padding:12px 32px;background:#0f6e56;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;transition:.2s}
.submit-btn:hover{background:#0a5440}
.submit-btn:disabled{background:#ccc;cursor:not-allowed} /* 항상 활성화 */

/* ── 결과 화면 ── */
#result-screen{display:none;min-height:100vh;background:#f0f4f8;padding-bottom:40px}
.result-header{background:linear-gradient(135deg,#0f6e56,#1a9e7a);color:#fff;padding:30px 20px;text-align:center}
.result-name{font-size:16px;opacity:.9;margin-bottom:4px}
.result-score{font-size:64px;font-weight:700;line-height:1}
.result-total{font-size:18px;opacity:.8;margin-top:6px}
.result-body{max-width:860px;margin:0 auto;padding:20px 16px}

.result-msg-box{border-radius:16px;padding:20px 24px;margin-bottom:20px;text-align:center}
.result-msg-box.pass{background:linear-gradient(135deg,#d1fae5,#a7f3d0);border:2px solid #059669}
.result-msg-box.fail{background:linear-gradient(135deg,#fee2e2,#fecaca);border:2px solid #dc2626}
.result-msg-box .msg-icon{font-size:48px;margin-bottom:8px}
.result-msg-box .msg-title{font-size:22px;font-weight:700;margin-bottom:6px}
.result-msg-box.pass .msg-title{color:#065f46}
.result-msg-box.fail .msg-title{color:#991b1b}
.result-msg-box .msg-sub{font-size:14px;line-height:1.7}
.result-msg-box.pass .msg-sub{color:#047857}
.result-msg-box.fail .msg-sub{color:#b91c1c}

.cat-scores{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:20px}
.cat-score-item{background:#fff;border-radius:12px;padding:16px;text-align:center;box-shadow:0 1px 6px rgba(0,0,0,.06)}
.cat-score-item.순환계{background:#f0f6ff}
.cat-score-item.호흡기계{background:#f0fbf6}
.cat-score-item.소화기계{background:#fff7f0}
.cat-score-item .cs-num{font-size:22px;font-weight:700}
.cat-score-item.순환계 .cs-num{color:#1a4fa0}
.cat-score-item.호흡기계 .cs-num{color:#0f6e56}
.cat-score-item.소화기계 .cs-num{color:#a05a00}
.cat-score-item .cs-label{font-size:11px;color:#666;margin-top:3px}
.wrong-list-title{font-size:16px;font-weight:700;color:#1a1a1a;margin-bottom:12px;text-align:left}
.wrong-item{background:#fff;border-radius:12px;padding:16px 18px;margin-bottom:10px;border-left:4px solid #dc2626;box-shadow:0 1px 6px rgba(0,0,0,.05)}
.wrong-item .wi-num{font-size:12px;font-weight:700;color:#dc2626;margin-bottom:6px}
.wrong-item .wi-q{font-size:13px;font-weight:500;margin-bottom:8px;line-height:1.6}
.wrong-item .wi-my{font-size:12.5px;color:#dc2626;margin-bottom:3px}
.wrong-item .wi-ans{font-size:12.5px;color:#059669;font-weight:700}
.wrong-item .wi-exp{font-size:12px;margin-top:8px;padding:8px 12px;background:#fefce8;border-radius:6px;color:#555;line-height:1.6}
.retry-btn{width:100%;padding:14px;background:#0f6e56;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:16px;transition:.2s}
.retry-btn:hover{background:#0a5440}
.dl-btn{flex:1;padding:13px;border:2px solid #0f6e56;background:#fff;color:#0f6e56;border-radius:12px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer}
.dl-btn:hover{background:#0f6e56;color:#fff}
.q-block.unanswered { border:2px solid #fca5a5 !important; background:#fff8f8 !important; }
.unanswered-warning { color:#dc2626; font-size:12px; font-weight:700; margin-top:8px; padding:6px 10px; background:#fee2e2; border-radius:8px; }
#btn-warning { background:#fee2e2; border:2px solid #fca5a5; border-radius:12px; padding:12px 16px; margin-top:10px; font-size:13px; color:#991b1b; font-weight:700; text-align:center; display:none; }
@media(max-width:600px){
  .cat-scores{grid-template-columns:1fr 1fr}
  .result-score{font-size:48px}
  .submit-bar{flex-wrap:wrap}
}
</style>
</head>
<body>

<!-- ── 시작 화면 ── -->
<div id="start-screen">
<div class="start-box">
  <div style="font-size:40px;margin-bottom:12px">📝</div>
  <h1>2학년 2차 정기고사 대비</h1>
  <h2>온라인 모의고사</h2>
  <div class="sub">순환계 · 호흡기계 · 소화기계 | 총 50문제</div>
  <div class="info-grid">
    <div class="info-card"><div class="num">50</div><div class="label">문항</div></div>
    <div class="info-card"><div class="num">5지</div><div class="label">선다형</div></div>
    <div class="info-card"><div class="num">즉시</div><div class="label">채점</div></div>
  </div>
  <div class="pass-badge">🎯 합격 기준: <strong>30문항 이상</strong> 정답 (60점 이상)<br><span style="font-size:12px">🟦 하(1~20) · 🟨 중(21~40) · 🟥 상(41~50)</span></div>
  <select class="name-input" id="class-select" onchange="updateRoster()" style="margin-bottom:10px">
    <option value="">① 반 선택</option>
    <option value="2학년 7반">2학년 7반</option>
    <option value="2학년 8반">2학년 8반</option>
  </select>
  <select class="name-input" id="student-select" onchange="fillName()" style="margin-bottom:10px" disabled>
    <option value="">② 번호 선택</option>
  </select>
  <div id="name-confirm" style="display:none;background:#f0fbf6;border:1px solid #0f6e56;border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:14px;text-align:center;color:#065f46;font-weight:700"></div>
  <input class="name-input" id="access-code" type="text" inputmode="numeric" placeholder="③ 선생님이 알려준 접속 코드" style="margin-bottom:8px;text-align:center;letter-spacing:2px" oninput="checkCode()" disabled>
  <div id="code-msg" style="display:none;font-size:13px;margin-bottom:10px;text-align:center;font-weight:700"></div>
  <button class="start-btn" id="start-btn" onclick="startQuiz()" disabled>시험 시작하기 →</button>
</div>
</div>

<!-- ── 퀴즈 화면 ── -->
<div id="quiz-screen">
  <div class="quiz-header">
    <div class="quiz-header-inner">
      <div>
        <div class="header-title">2학년 2차 정기고사 대비</div>
        <div class="header-sub" id="student-label"></div>
      </div>
      <div class="progress-wrap">
        <div id="progress-text" style="font-size:13px;text-align:right">0 / 50</div>
        <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>
      </div>
    </div>
  </div>
  <div class="quiz-main" id="quiz-main"></div>
  <div class="submit-bar">
    <div id="btn-warning"></div>
    <div class="submit-bar-inner">
      <div class="answered-count">답안 입력: <strong id="ans-count">0</strong> / 50</div>
      <button class="submit-btn" id="submit-btn" onclick="submitQuiz()">채점하기</button>
    </div>
  </div>
</div>

<!-- ── 결과 화면 ── -->
<div id="result-screen">
  <div class="result-header">
    <div class="result-name" id="result-name"></div>
    <div class="result-score" id="result-score">0</div>
    <div class="result-total">/ 50 문항 정답</div>
  </div>
  <div class="result-body">
    <div class="result-msg-box" id="result-msg-box">
      <div class="msg-icon" id="msg-icon"></div>
      <div class="msg-title" id="msg-title"></div>
      <div class="msg-sub" id="msg-sub"></div>
    </div>
    <div class="cat-scores" id="cat-scores"></div>
    <div id="wrong-section"></div>

    <!-- 점수 제출 섹션 -->
    <div id="score-submit-section" style="display:none;background:#f0fbf6;border:2px dashed #0f6e56;border-radius:14px;padding:18px;margin-bottom:16px;">
      <p style="font-size:14px;font-weight:700;color:#0f6e56;margin-bottom:10px;">📮 점수 자동 제출</p>
      <p style="font-size:13px;color:#555;margin-bottom:12px;">
        반: <strong id="submit-class-display"></strong> &nbsp;|&nbsp; 이름: <strong id="submit-student-display"></strong>
      </p>
      <div id="send-result" style="font-size:14px;margin-top:8px;text-align:center;min-height:20px;font-weight:700;">제출 중...</div>
    </div>

    <div id="dl-section" style="display:flex;gap:10px;margin:16px 0;">
      <button class="dl-btn" onclick="downloadPDF('all')">📄 전체 문제+해설 저장</button>
      <button class="dl-btn" onclick="downloadPDF('wrong')">📝 틀린 문제만 저장</button>
    </div>
    <button class="retry-btn" onclick="retryQuiz()">🔄 다시 풀기</button>
  </div>
</div>

<script>
// ════════════════════════════════════════════════
// 📌 접속 코드 설정 (시험마다 여기를 수정하세요)
// ════════════════════════════════════════════════
const ACCESS_CODES = {
  "2학년 7반": "1111",   // ← 7반 코드 (원하는 숫자로 변경)
  "2학년 8반": "2222"    // ← 8반 코드 (원하는 숫자로 변경)
};
// ════════════════════════════════════════════════

const QUESTIONS = [
// ===== 하 난이도 (1~20) =====
// 순환계 하
{"num":1,"q":"저혈압의 진단 기준으로 옳은 것은?","choices":["수축기 혈압 100mmHg 미만","수축기 혈압 90mmHg 미만","이완기 혈압 60mmHg 미만","수축기 혈압 80mmHg 미만","이완기 혈압 50mmHg 미만"],"ans":2,"cat":"순환계","lv":"하","exp":"저혈압은 수축기 혈압 90mmHg 미만으로 정의한다."},
{"num":2,"q":"1차성 저혈압에 대한 설명으로 옳은 것은?","choices":["패혈성 쇼크로 인해 발생한다","인구의 10~20%에서 발견된다","치료가 반드시 필요하다","체질적으로 혈압이 낮은 상태로 치료가 필요하지 않다","탄력 스타킹 착용이 필수이다"],"ans":4,"cat":"순환계","lv":"하","exp":"1차성 저혈압은 인구의 1~2%에서 발견되며 체질적으로 혈압이 낮은 상태로 치료가 필요하지 않다."},
{"num":3,"q":"동맥경화증의 위험요인이 아닌 것은?","choices":["고콜레스테롤혈증","흡연","규칙적인 걷기 운동","고혈압","당뇨병"],"ans":3,"cat":"순환계","lv":"하","exp":"규칙적인 걷기 운동은 혈액순환을 촉진하고 근육을 강화하는 보호 요인이다."},
{"num":4,"q":"심부전의 정의로 옳은 것은?","choices":["심장 판막이 파열된 상태","심장이 충분한 혈액을 펌프해내지 못하는 상태","관상동맥이 폐색된 상태","심근세포가 괴사된 상태","심방이 불규칙하게 수축하는 상태"],"ans":2,"cat":"순환계","lv":"하","exp":"심부전은 인체가 필요한 대사 요구를 충족시킬 만큼 충분한 혈액을 심장이 펌프해내지 못하는 상태이다."},
{"num":5,"q":"빈혈의 대표적인 증상은?","choices":["고열과 오한","피로, 쇠약감, 창백한 피부","심한 흉통과 식은땀","하지 부종과 호흡곤란","혈압 상승과 두통"],"ans":2,"cat":"순환계","lv":"하","exp":"빈혈의 대표 증상은 피로이며 쇠약감, 창백한 피부, 어지러움, 두통 등이 나타난다."},
{"num":6,"q":"철결핍성 빈혈의 특징적인 증상은?","choices":["황달과 비장 비대","혈뇨와 구강 괴사","숟가락 모양의 손톱, 혀의 통증","머리털이 일찍 희어짐","창백, 혈뇨, 월경 과다"],"ans":3,"cat":"순환계","lv":"하","exp":"철결핍성 빈혈의 특징적 증상은 숟가락 모양의 손톱(koilonychia), 혀의 통증, 윤기없는 피부·머리털이다."},
// 호흡기계 하
{"num":7,"q":"후두에 대한 설명으로 옳은 것은?","choices":["하기도에 속한다","기관지와 폐 사이에 위치한다","후두개는 이물질이 기관으로 들어가는 것을 막는다","발성 시 소리의 공명을 돕는 역할을 한다","인두와 직접 연결되지 않는다"],"ans":3,"cat":"호흡기계","lv":"하","exp":"후두에는 후두개(후두덮개)가 있어 이물질이 기관으로 들어가는 것을 막는다. 후두는 인두와 기관 사이에 위치한 상기도이다."},

function updateRoster() {
  const cls = document.getElementById('class-select').value;
  const sel = document.getElementById('student-select');
  const nameDiv = document.getElementById('name-confirm');
  const startBtn = document.getElementById('start-btn');
  sel.innerHTML = '<option value="">② 번호 선택</option>';
  nameDiv.style.display = 'none';
  startBtn.disabled = true;
  if (!cls) { sel.disabled = true; return; }
  sel.disabled = false;
  const students = ROSTER[cls] || [];
  students.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s.no;
    opt.textContent = s.no + '번 ' + s.name;
    sel.appendChild(opt);
  });
}

function fillName() {
  const cls = document.getElementById('class-select').value;
  const no = parseInt(document.getElementById('student-select').value);
  const nameDiv = document.getElementById('name-confirm');
  const startBtn = document.getElementById('start-btn');
  const codeInput = document.getElementById('access-code');
  // 번호 바뀌면 코드 입력 초기화
  codeInput.value = '';
  document.getElementById('code-msg').style.display = 'none';
  startBtn.disabled = true;
  if (!no) { nameDiv.style.display='none'; codeInput.disabled = true; return; }
  const students = ROSTER[cls] || [];
  const student = students.find(s => s.no === no);
  if (student) {
    nameDiv.style.display = 'block';
    nameDiv.textContent = '✅ ' + cls + ' ' + no + '번 ' + student.name + ' 님';
    codeInput.disabled = false;  // 이름 확인되면 코드 입력 가능
  }
}

function checkCode() {
  const cls = document.getElementById('class-select').value;
  const entered = document.getElementById('access-code').value.trim();
  const msg = document.getElementById('code-msg');
  const startBtn = document.getElementById('start-btn');
  const correctCode = ACCESS_CODES[cls];

  if (entered === '') {
    msg.style.display = 'none';
    startBtn.disabled = true;
    return;
  }
  if (entered === correctCode) {
    msg.style.display = 'block';
    msg.style.color = '#0f6e56';
    msg.textContent = '✅ 코드 확인! 시험을 시작할 수 있어요.';
    startBtn.disabled = false;
  } else {
    msg.style.display = 'block';
    msg.style.color = '#dc2626';
    msg.textContent = '❌ 코드가 맞지 않아요. 선생님께 확인하세요.';
    startBtn.disabled = true;
  }
}

function startQuiz() {
  const cls = document.getElementById('class-select').value;
  const no = parseInt(document.getElementById('student-select').value);
  const code = document.getElementById('access-code').value.trim();
  if(!cls){ alert('반을 선택해주세요.'); return; }
  if(!no){ alert('번호를 선택해주세요.'); return; }
  if(code !== ACCESS_CODES[cls]){ alert('접속 코드가 맞지 않아요.'); return; }
  const students = ROSTER[cls] || [];
  const student = students.find(s => s.no === no);
  studentName = no + '번 ' + (student ? student.name : '');
  studentClass = cls;
  document.getElementById('student-label').textContent = cls + ' ' + studentName + '님';
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  renderQuiz();
}

function renderQuiz() {
  const main = document.getElementById('quiz-main');
  main.innerHTML = '<div class="lv-notice"><span><span class="lv-badge lv-하">하</span> 1~20번: 기본 개념</span><span><span class="lv-badge lv-중">중</span> 21~40번: 적용·간호</span><span><span class="lv-badge lv-상">상</span> 41~50번: 비교·심화</span></div>';
  QUESTIONS.forEach((q, idx) => {
    const block = document.createElement('div');
    block.className = 'q-block';
    block.id = 'q-block-' + q.num;
    const catClass = 'cat-' + q.cat;
    const lvClass = 'lv-' + (q.lv||'');
    block.innerHTML = `
      <div class="q-num">문항 ${q.num}<span class="lv-badge ${lvClass}">${q.lv||''}</span></div>
      <span class="q-cat ${catClass}">${q.cat}</span>
      <div class="q-text">${q.num}. ${q.q}</div>
      <ul class="choice-list" id="choices-${q.num}">
        ${q.choices.map((c, i) => `
          <li class="choice-item">
            <button class="choice-btn" onclick="selectAnswer(${q.num}, ${i+1}, this)">
              ${i+1}. ${c}
            </button>
          </li>
        `).join('')}
      </ul>
      <div class="q-exp" id="exp-${q.num}">${q.exp}</div>
    `;
    main.appendChild(block);
  });
}

function selectAnswer(qNum, choice, btn) {
  if (submitted) return;
  userAnswers[qNum] = choice;
  const btns = document.querySelectorAll('#choices-' + qNum + ' .choice-btn');
  btns.forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  updateProgress();
}

function updateProgress() {
  const count = Object.keys(userAnswers).length;
  document.getElementById('ans-count').textContent = count;
  document.getElementById('progress-text').textContent = count + ' / 50';
  document.getElementById('progress-fill').style.width = (count / 50 * 100) + '%';
  // 버튼 항상 활성화 - 미응답은 제출 시 차단
}


function scrollToQ(num){
  const block = document.getElementById('q-block-' + num);
  if(block) block.scrollIntoView({behavior:'smooth', block:'center'});
}
function submitQuiz() {
  // 미응답 문항 수집
  const unAnswered = QUESTIONS.filter(q => !userAnswers[q.num]).map(q => q.num);
  if (unAnswered.length > 0) {
    // 기존 워닝 제거
    document.querySelectorAll('.unanswered-warning').forEach(el=>el.remove());
    document.querySelectorAll('.q-block.unanswered').forEach(el=>el.classList.remove('unanswered'));
    // 미응답 블록 강조
    unAnswered.forEach(n => {
      const block = document.getElementById('q-block-' + n);
      if(block){
        block.classList.add('unanswered');
        const warn = document.createElement('div');
        warn.className = 'unanswered-warning';
        warn.textContent = '⚠ 답을 선택해주세요';
        block.appendChild(warn);
      }
    });
    // 첫 번째 미응답으로 스크롤
    const firstBlock = document.getElementById('q-block-' + unAnswered[0]);
    if(firstBlock) firstBlock.scrollIntoView({behavior:'smooth', block:'center'});
    // 버튼 아래 워닝 표시
    const btnWarn = document.getElementById('btn-warning');
    btnWarn.style.display = 'block';
    const linkHtml = unAnswered.slice(0,10).map(n =>
      `<a href="#" onclick="scrollToQ(${n});return false;" style="color:#991b1b;text-decoration:underline;font-weight:700;margin:0 2px">${n}번</a>`
    ).join(', ') + (unAnswered.length>10 ? ` 외 ${unAnswered.length-10}문항` : '');
    btnWarn.innerHTML = `❌ 아직 <strong>${unAnswered.length}문제</strong>를 풀지 않았어요!<br><span style="font-size:12px;font-weight:normal">미응답 문항: ${linkHtml} — 번호를 누르면 해당 문항으로 이동해요</span>`;
    return;
  }
  // 모두 응답 시 워닝 제거
  document.getElementById('btn-warning').style.display = 'none';
  document.querySelectorAll('.unanswered-warning').forEach(el=>el.remove());
  document.querySelectorAll('.q-block.unanswered').forEach(el=>el.classList.remove('unanswered'));
  if (!confirm('채점하시겠습니까?')) return;
  submitted = true;

  let score = 0;
  const catCorrect = {순환계:0, 호흡기계:0, 소화기계:0};
  const catTotal = {순환계:0, 호흡기계:0, 소화기계:0};
  const wrongList = [];

  QUESTIONS.forEach(q => {
    catTotal[q.cat] = (catTotal[q.cat] || 0) + 1;
    const myAns = userAnswers[q.num];
    const correct = myAns === q.ans;
    if (correct) {
      score++;
      catCorrect[q.cat] = (catCorrect[q.cat] || 0) + 1;
    } else {
      wrongList.push({...q, myAns});
    }

    const btns = document.querySelectorAll('#choices-' + q.num + ' .choice-btn');
    btns.forEach((b, i) => {
      const num = i + 1;
      if (num === q.ans) b.classList.add('show-correct');
      if (num === myAns && !correct) b.classList.add('wrong');
    });
    const expEl = document.getElementById('exp-' + q.num);
    if (expEl) expEl.classList.add('show');
  });

  // 결과 화면
  document.getElementById('quiz-screen').style.display = 'none';
  const rs = document.getElementById('result-screen');
  rs.style.display = 'block';
  document.getElementById('result-name').textContent = studentName + '님의 결과';
  document.getElementById('result-score').textContent = score;

  // 합격/불합격 메시지
  const msgBox = document.getElementById('result-msg-box');
  const pass = score >= PASS_SCORE;
  msgBox.className = 'result-msg-box ' + (pass ? 'pass' : 'fail');

  let icon, title, sub;
  if (score === 50) {
    icon = '🏆'; title = '완벽한 성적!';
    sub = '50문항 모두 정답이에요!<br>정기고사에서도 최고 점수를 기대합니다. 정말 훌륭해요! ✨';
  } else if (score >= 45) {
    icon = '🌟'; title = '아주 우수한 성적!';
    sub = `합격 기준(${PASS_SCORE}개)을 훨씬 넘었어요!<br>정기고사 준비가 충분합니다. 이 컨디션 유지해요! 👍`;
  } else if (score >= 40) {
    icon = '😊'; title = '좋은 성적입니다!';
    sub = `합격 기준(${PASS_SCORE}개)을 넘었어요!<br>틀린 문제를 한 번 더 복습하면 정기고사 준비 완료! 📚`;
  } else if (pass) {
    icon = '✅'; title = '합격!';
    sub = `${score}개 정답으로 합격 기준(${PASS_SCORE}개)을 달성했어요!<br>틀린 ${50-score}문제를 집중 복습하면 더 좋은 결과를 얻을 수 있어요. 💪`;
  } else if (score >= 25) {
    icon = '📖'; title = '조금 더 노력이 필요해요';
    sub = `합격까지 ${PASS_SCORE - score}문항 부족해요.<br>오답 문제를 중심으로 복습하고 다시 도전해보세요! 할 수 있어요 💪`;
  } else if (score >= 20) {
    icon = '😅'; title = '더 열심히 복습해요!';
    sub = `합격 기준(${PASS_SCORE}개)에 아직 ${PASS_SCORE - score}문항이 부족합니다.<br>세 단원의 핵심 내용을 다시 꼼꼼히 정리해봐요. 포기하지 마세요! 🔥`;
  } else {
    icon = '💪'; title = '기초부터 다시 도전!';
    sub = `많이 어려웠나요? 걱정하지 마세요.<br>자율학습 자료를 처음부터 차근차근 읽고 다시 시도해봐요.<br>반복이 실력이 됩니다! 📝`;
  }

  document.getElementById('msg-icon').textContent = icon;
  document.getElementById('msg-title').textContent = title;
  document.getElementById('msg-sub').innerHTML = sub;

  // 단원별 점수
  const catHtml = Object.keys(catTotal).map(cat => `
    <div class="cat-score-item ${cat}">
      <div class="cs-num">${catCorrect[cat]||0}/${catTotal[cat]}</div>
      <div class="cs-label">${cat}</div>
    </div>
  `).join('');
  document.getElementById('cat-scores').innerHTML = catHtml;

  // 오답 목록
  let wrongHtml = '';
  if (wrongList.length > 0) {
    wrongHtml = `<div class="wrong-list-title">❌ 오답 목록 (${wrongList.length}문항)</div>`;
    wrongList.forEach(q => {
      wrongHtml += `
        <div class="wrong-item">
          <div class="wi-num">문항 ${q.num} · ${q.cat}</div>
          <div class="wi-q">${q.q}</div>
          <div class="wi-my">내 답: ${q.myAns}번. ${q.choices[q.myAns-1]}</div>
          <div class="wi-ans">정답: ${q.ans}번. ${q.choices[q.ans-1]}</div>
          ${q.exp ? `<div class="wi-exp">💡 ${q.exp}</div>` : ''}
        </div>
      `;
    });
  } else {
    wrongHtml = `<div style="text-align:center;padding:20px;color:#059669;font-weight:700">🎉 오답이 없습니다!</div>`;
  }
  document.getElementById('wrong-section').innerHTML = wrongHtml;

  // 점수 제출 섹션 표시
  document.getElementById('score-submit-section').style.display = 'block';
  document.getElementById('submit-class-display').textContent = studentClass;
  document.getElementById('submit-student-display').textContent = studentName;

  window.scrollTo(0, 0);
  sendScore(); // 채점과 동시에 자동 제출
}


function downloadPDF(mode){
  const circles=['①','②','③','④','⑤'];
  let rows = '';
  let count = 0;
  let correctCount = 0;
  QUESTIONS.forEach(q => {
    const picked = userAnswers[q.num] || null;
    const correct = q.ans;
    const isOk = picked === correct;
    if(isOk) correctCount++;
  });
  QUESTIONS.forEach(q => {
    const picked = userAnswers[q.num] || null;
    const correct = q.ans;
    const isOk = picked === correct;
    if(mode === 'wrong' && isOk) return;
    count++;
    let choicesHtml = '';
    q.choices.forEach((opt, idx) => {
      let style = '';
      if(idx+1 === correct) style = 'background:#dcfce7;font-weight:bold;';
      else if(idx+1 === picked && !isOk) style = 'background:#fee2e2;text-decoration:line-through;';
      choicesHtml += `<div style="padding:3px 8px;${style}">${circles[idx]} ${opt}</div>`;
    });
    const myAns = picked ? `${picked}번` : '미응답';
    rows += `
    <div style="margin-bottom:18px;page-break-inside:avoid;border-bottom:1px solid #eee;padding-bottom:14px;">
      <div style="font-weight:bold;margin-bottom:6px;">
        <span style="color:#0f6e56;">문제 ${q.num}.</span>
        <span style="font-size:12px;padding:2px 8px;border-radius:6px;margin-left:6px;${isOk?'background:#dcfce7;color:#15803d;':'background:#fee2e2;color:#b91c1c;'}">${isOk?'정답':'오답'}</span>
        <span style="font-size:12px;color:#888;margin-left:6px;">[${q.cat}·${q.lv}]</span>
      </div>
      <div style="margin-bottom:8px;">${q.q}</div>
      <div style="font-size:14px;margin-bottom:8px;">${choicesHtml}</div>
      <div style="background:#f8fafc;border-left:3px solid #0f6e56;padding:8px 12px;font-size:13px;">
        <b style="color:#0f6e56;">정답: ${circles[correct-1]} (${correct}번)</b> · 내 답: ${myAns}<br>${q.exp || ''}
      </div>
    </div>`;
  });

  const title = mode === 'wrong' ? '틀린 문제 오답노트' : '전체 문제 + 해설';
  const studentInfo = (typeof studentClass !== 'undefined' && studentClass) ? studentClass + ' ' + studentName : '';
  const now = new Date().toLocaleString('ko-KR');
  const win = window.open('', '_blank');
  win.document.write(`
    <html><head><title>${title}</title>
    <style>
      body{font-family:'Malgun Gothic',sans-serif;padding:30px;color:#222;line-height:1.5;}
      h1{font-size:20px;color:#0f6e56;border-bottom:2px solid #0f6e56;padding-bottom:8px;}
      .meta{font-size:13px;color:#666;margin-bottom:20px;}
      @media print { .no-print{display:none;} }
    </style></head><body>
    <h1>📚 2학년 정기고사 대비 — ${title}</h1>
    <div class="meta">${studentInfo} · 점수 ${correctCount}점 / 50점 · ${now}<br>총 ${count}문항</div>
    ${rows}
    <button class="no-print" onclick="window.print()" style="position:fixed;top:20px;right:20px;padding:12px 20px;background:#0f6e56;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:bold;cursor:pointer;">🖨️ 인쇄 / PDF 저장</button>
    <script>setTimeout(()=>window.print(), 600);<\/script>
    </body></html>`);
  win.document.close();
}

function retryQuiz() {
  userAnswers = {};
  submitted = false;
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  document.getElementById('score-submit-section').style.display = 'none';
  renderQuiz();
  updateProgress();
  window.scrollTo(0, 0);
}

const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxvJgyDUPsGqqK4urGYhl7XQrTHBDhMBTaOJmwr9IdaJRxAUm5gPTFCdt_1ZWns7NmZ/exec';

function sendScore(){
  const resultEl = document.getElementById('send-result');
  if(hasSubmitted){
    resultEl.style.color='#059669';
    resultEl.textContent='✅ 이미 제출되었습니다 (첫 채점 점수만 기록)';
    return;
  }
  hasSubmitted = true;
  resultEl.style.color = '#888';
  resultEl.textContent = '제출 중...';

  let score = 0;
  const catCorrect = {순환계:0, 호흡기계:0, 소화기계:0};
  const wrong = [];
  QUESTIONS.forEach(q => {
    const myAns = userAnswers[q.num];
    if(myAns === q.ans){
      score++;
      catCorrect[q.cat] = (catCorrect[q.cat]||0)+1;
    } else {
      wrong.push(q.num);
    }
  });

  fetch(SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify({
      className: studentClass,
      student: studentName,
      grade: '2학년',
      round: '2차',
      setNum: '1세트',
      score: score,
      correct: score,
      total: 50,
      wrongList: wrong.slice(0,20).join(', ')
    })
  })
  .then(r=>r.json())
  .then(d=>{
    if(d.result==='success'){
      resultEl.style.color='#059669';
      resultEl.textContent='✅ 점수가 선생님께 자동 제출되었습니다!';
    } else { throw new Error(); }
  })
  .catch(()=>{
    hasSubmitted = false; // 실패 시 재시도 허용
    resultEl.style.color='#dc2626';
    resultEl.textContent='⚠️ 제출 실패. 선생님께 직접 알려주세요.';
  });
}
