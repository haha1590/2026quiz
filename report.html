<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 모의고사 점수 리포트</title>
<style>
  :root {
    --primary: #1a73e8;
    --primary-light: #e8f0fe;
    --danger: #d93025;
    --danger-light: #fce8e6;
    --warn-bg: #fff3e0;
    --warn-text: #e65100;
    --success: #137333;
    --success-light: #e6f4ea;
    --border: #dadce0;
    --text: #202124;
    --text-muted: #5f6368;
    --bg: #f8f9fa;
    --white: #ffffff;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── 헤더 ── */
  header {
    background: var(--primary);
    color: white;
    padding: 20px 24px 16px;
  }
  header h1 {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 2px;
  }
  header p {
    font-size: 13px;
    opacity: 0.85;
  }

  /* ── 메인 ── */
  main { padding: 20px 16px; max-width: 900px; margin: 0 auto; }

  /* ── 설정 안내 ── */
  #setup-notice {
    background: var(--warn-bg);
    border: 1px solid #ffcc80;
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 20px;
    font-size: 13px;
    color: var(--warn-text);
  }
  #setup-notice strong { display: block; margin-bottom: 6px; font-size: 14px; }
  #setup-notice input {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid #ffcc80;
    border-radius: 6px;
    font-size: 13px;
    margin-top: 8px;
    background: white;
    color: var(--text);
  }
  #setup-notice button {
    margin-top: 8px;
    padding: 8px 16px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
  }

  /* ── 요약 카드 ── */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 10px;
    margin-bottom: 20px;
  }
  .summary-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 12px;
    text-align: center;
  }
  .summary-card .num {
    font-size: 26px;
    font-weight: 700;
    color: var(--primary);
    line-height: 1.1;
  }
  .summary-card .label {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
  }
  .summary-card.danger .num { color: var(--danger); }
  .summary-card.success .num { color: var(--success); }

  /* ── 필터 ── */
  .filter-section {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 16px;
  }
  .filter-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    margin-bottom: 10px;
  }
  .filter-row:last-child { margin-bottom: 0; }
  .filter-label {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 600;
    min-width: 40px;
  }
  .chip {
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 12px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .chip.active {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
  }

  /* ── 새로고침 버튼 ── */
  .toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .toolbar h2 {
    font-size: 15px;
    font-weight: 600;
  }
  .btn-refresh {
    padding: 6px 14px;
    background: var(--primary-light);
    color: var(--primary);
    border: none;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    font-weight: 600;
  }
  .btn-refresh:hover { background: #d2e3fc; }

  /* ── 테이블 ── */
  .table-wrap {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  thead tr {
    background: #f1f3f4;
  }
  th {
    padding: 10px 12px;
    text-align: left;
    font-weight: 600;
    font-size: 12px;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  td {
    padding: 10px 12px;
    border-bottom: 1px solid #f1f3f4;
    vertical-align: middle;
  }
  tr:last-child td { border-bottom: none; }
  tr.fail-row {
    background: var(--danger-light);
  }
  tr.fail-row td { color: #b31412; }
  .rank-badge {
    font-weight: 700;
    font-size: 13px;
    color: var(--text-muted);
  }
  .rank-1 { color: #f59e0b; }
  .rank-2 { color: #94a3b8; }
  .rank-3 { color: #b45309; }
  .score-cell { font-weight: 700; font-size: 14px; }
  .pct-bar-wrap { display: flex; align-items: center; gap: 6px; }
  .pct-bar {
    height: 6px;
    border-radius: 3px;
    background: #e0e0e0;
    flex: 1;
    min-width: 50px;
    overflow: hidden;
  }
  .pct-bar-fill { height: 100%; border-radius: 3px; background: var(--primary); }
  .pct-bar-fill.low { background: var(--danger); }
  .pct-text { font-size: 12px; font-weight: 600; min-width: 34px; }
  .fail-badge {
    background: var(--danger);
    color: white;
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 4px;
    margin-left: 4px;
    vertical-align: middle;
  }
  .wrong-list {
    font-size: 11px;
    color: var(--text-muted);
    max-width: 160px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .time-cell { font-size: 11px; color: var(--text-muted); }

  /* ── 빈 상태 ── */
  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--text-muted);
  }
  .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  /* ── 로딩 ── */
  .loading {
    text-align: center;
    padding: 40px;
    color: var(--text-muted);
    font-size: 14px;
  }
  .spinner {
    width: 28px; height: 28px;
    border: 3px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── 범례 ── */
  .legend {
    display: flex;
    gap: 16px;
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 10px;
  }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-dot {
    width: 12px; height: 12px;
    border-radius: 2px;
  }
</style>
</head>
<body>

<header>
  <h1>📊 2026 모의고사 점수 리포트</h1>
  <p>김해한일여자고등학교 보건간호과</p>
</header>

<main>

  <!-- Apps Script URL 설정 안내 -->
  <div id="setup-notice">
    <strong>⚙️ 처음 한 번만 설정하세요</strong>
    Apps Script 배포 후 받은 웹 앱 URL을 아래에 입력하고 저장하세요.
    <input type="text" id="script-url-input" placeholder="https://script.google.com/macros/s/.../exec">
    <button onclick="saveUrl()">저장하고 불러오기</button>
  </div>

  <!-- 요약 카드 -->
  <div class="summary-grid" id="summary-grid" style="display:none">
    <div class="summary-card">
      <div class="num" id="sum-total">0</div>
      <div class="label">총 제출 수</div>
    </div>
    <div class="summary-card success">
      <div class="num" id="sum-avg">-</div>
      <div class="label">전체 평균</div>
    </div>
    <div class="summary-card danger">
      <div class="num" id="sum-fail">0</div>
      <div class="label">60% 미만</div>
    </div>
    <div class="summary-card">
      <div class="num" id="sum-top">-</div>
      <div class="label">최고점</div>
    </div>
  </div>

  <!-- 필터 -->
  <div class="filter-section" id="filter-section" style="display:none">
    <div class="filter-row">
      <span class="filter-label">학년</span>
      <div id="filter-grade"></div>
    </div>
    <div class="filter-row">
      <span class="filter-label">반</span>
      <div id="filter-class"></div>
    </div>
    <div class="filter-row">
      <span class="filter-label">회차</span>
      <div id="filter-round"></div>
    </div>
  </div>

  <!-- 테이블 툴바 -->
  <div class="toolbar" id="toolbar" style="display:none">
    <h2 id="table-title">점수 순위</h2>
    <button class="btn-refresh" onclick="loadData()">🔄 새로고침</button>
  </div>

  <!-- 테이블 -->
  <div class="table-wrap" id="table-wrap">
    <div class="loading">
      <div class="spinner"></div>
      URL을 입력해 점수를 불러오세요
    </div>
  </div>

  <!-- 범례 -->
  <div class="legend" id="legend" style="display:none">
    <div class="legend-item">
      <div class="legend-dot" style="background:var(--danger-light);border:1px solid #f5c6c6"></div>
      60% 미만 (과락 위험)
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:var(--white);border:1px solid var(--border)"></div>
      60% 이상
    </div>
  </div>

</main>

<script>
const STORAGE_KEY = 'quiz_report_script_url';
let allData = {};
let activeGrade = 'all';
let activeClass = 'all';
let activeRound = 'all';

// ── URL 저장/불러오기 ──
function saveUrl() {
  const url = document.getElementById('script-url-input').value.trim();
  if (!url.startsWith('https://script.google.com')) {
    alert('올바른 Apps Script URL을 입력해주세요.');
    return;
  }
  localStorage.setItem(STORAGE_KEY, url);
  loadData();
}

function getSavedUrl() {
  return localStorage.getItem(STORAGE_KEY) || 'https://script.google.com/macros/s/AKfycbwVbwn0075rkPToc0_SbHy2Jhjk15mnNRlUgNcnSscOGZ9fStWqOmqe5BzY3sOtEyn2/exec';
}

// ── 초기화 ──
window.onload = function() {
  const saved = getSavedUrl();
  if (saved) {
    document.getElementById('setup-notice').style.display = 'none';
    loadData();
  } else {
    document.getElementById('script-url-input').value = '';
  }
};

// ── 데이터 로드 ──
function loadData() {
  const url = getSavedUrl();
  if (!url) return;

  document.getElementById('table-wrap').innerHTML = '<div class="loading"><div class="spinner"></div>점수 불러오는 중...</div>';

  fetch(url)
    .then(r => r.json())
    .then(json => {
      if (json.result !== 'success') throw new Error(json.message);
      allData = json.data;
      buildFilters();
      renderTable();
      document.getElementById('summary-grid').style.display = '';
      document.getElementById('filter-section').style.display = '';
      document.getElementById('toolbar').style.display = '';
      document.getElementById('legend').style.display = '';
    })
    .catch(err => {
      document.getElementById('table-wrap').innerHTML =
        `<div class="empty-state"><div class="icon">⚠️</div><p>데이터를 불러오지 못했습니다.<br><small>${err.message}</small></p></div>`;
    });
}

// ── 필터 생성 ──
function buildFilters() {
  const grades = new Set();
  const classes = new Set();
  const rounds = new Set();

  Object.entries(allData).forEach(([cls, rows]) => {
    rows.forEach(r => {
      grades.add(r.grade || (cls.includes('3') ? '3학년' : '2학년'));
      classes.add(cls);
      if (r.round) rounds.add(r.round);
    });
  });

  renderChips('filter-grade', ['전체', ...Array.from(grades).sort()], 'grade');
  renderChips('filter-class', ['전체', ...Array.from(classes).sort()], 'class');
  renderChips('filter-round', ['전체', ...Array.from(rounds).sort()], 'round');
}

function renderChips(containerId, items, type) {
  const el = document.getElementById(containerId);
  el.innerHTML = '';
  items.forEach(item => {
    const chip = document.createElement('span');
    chip.className = 'chip' + (item === '전체' ? ' active' : '');
    chip.textContent = item;
    chip.onclick = () => setFilter(type, item === '전체' ? 'all' : item, chip, el);
    el.appendChild(chip);
  });
}

function setFilter(type, value, chip, container) {
  container.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  if (type === 'grade') activeGrade = value;
  else if (type === 'class') activeClass = value;
  else if (type === 'round') activeRound = value;
  renderTable();
}

// ── 테이블 렌더링 ──
function renderTable() {
  let rows = [];

  Object.entries(allData).forEach(([cls, data]) => {
    data.forEach(r => {
      const grade = r.grade || (cls.includes('3') ? '3학년' : '2학년');
      if (activeGrade !== 'all' && grade !== activeGrade) return;
      if (activeClass !== 'all' && cls !== activeClass) return;
      if (activeRound !== 'all' && r.round !== activeRound) return;
      rows.push({ ...r, className: cls, grade });
    });
  });

  // 점수 내림차순 정렬
  rows.sort((a, b) => b.scoreNum - a.scoreNum);

  // 요약 업데이트
  const total = rows.length;
  const fails = rows.filter(r => r.pct < 60).length;
  const avg = total > 0 ? Math.round(rows.reduce((s, r) => s + r.scoreNum, 0) / total) : 0;
  const top = total > 0 ? rows[0].scoreNum : 0;

  document.getElementById('sum-total').textContent = total;
  document.getElementById('sum-fail').textContent = fails;
  document.getElementById('sum-avg').textContent = total > 0 ? avg + '점' : '-';
  document.getElementById('sum-top').textContent = total > 0 ? top + '점' : '-';

  const title = [
    activeGrade !== 'all' ? activeGrade : '전학년',
    activeClass !== 'all' ? activeClass : '전반',
    activeRound !== 'all' ? activeRound : '전체회차'
  ].join(' · ');
  document.getElementById('table-title').textContent = `${title} 점수 순위`;

  if (rows.length === 0) {
    document.getElementById('table-wrap').innerHTML =
      '<div class="empty-state"><div class="icon">📭</div><p>해당 조건의 제출 데이터가 없습니다.</p></div>';
    return;
  }

  const rankIcon = (i) => {
    if (i === 0) return '<span class="rank-badge rank-1">🥇</span>';
    if (i === 1) return '<span class="rank-badge rank-2">🥈</span>';
    if (i === 2) return '<span class="rank-badge rank-3">🥉</span>';
    return `<span class="rank-badge">${i + 1}위</span>`;
  };

  const tableHtml = `
    <table>
      <thead>
        <tr>
          <th>순위</th>
          <th>반</th>
          <th>번호+이름</th>
          <th>회차</th>
          <th>세트</th>
          <th>점수</th>
          <th>정답률</th>
          <th>틀린 문항</th>
          <th>제출시간</th>
        </tr>
      </thead>
      <tbody>
        ${rows.map((r, i) => {
          const isFail = r.pct < 60;
          const barColor = isFail ? 'low' : '';
          const failBadge = isFail ? '<span class="fail-badge">⚠ 60% 미만</span>' : '';
          return `
            <tr class="${isFail ? 'fail-row' : ''}">
              <td>${rankIcon(i)}</td>
              <td>${r.className}</td>
              <td>${r.student}${failBadge}</td>
              <td>${r.round || '-'}</td>
              <td>${r.setNum || '-'}</td>
              <td class="score-cell">${r.score}</td>
              <td>
                <div class="pct-bar-wrap">
                  <div class="pct-bar">
                    <div class="pct-bar-fill ${barColor}" style="width:${r.pct}%"></div>
                  </div>
                  <span class="pct-text">${r.pct}%</span>
                </div>
              </td>
              <td><div class="wrong-list" title="${r.wrongList}">${r.wrongList || '-'}</div></td>
              <td class="time-cell">${r.submittedAt}</td>
            </tr>
          `;
        }).join('')}
      </tbody>
    </table>
  `;

  document.getElementById('table-wrap').innerHTML = tableHtml;
}
</script>
</body>
</html>
